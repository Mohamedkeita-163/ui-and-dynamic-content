<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Shopping List Widget</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="widget">

    <!-- Masthead -->
    <header class="masthead">
        <img src="img/41259.jpg" alt="basket">
        <h1>BUY<br>GROCERIES</h1>
        <p>What do you need to buy today?</p>
    </header>

    <!-- Main -->
    <main>
        <input type="text" id="itemInput" placeholder="your item here ...">
        <button id="addBtn">ADD TO LIST</button>

        <p class="feedback"></p>

        <ul id="itemList"></ul>
    </main>

    <!-- Footer -->
    <footer>
        <a href="#"><i class="fa-brands fa-google-plus-g"></i></a>
        <a href="#"><i class="fa-brands fa-linkedin-in"></i></a>
        <a href="#"><i class="fa-brands fa-facebook-f"></i></a>
    </footer>

</div>

<!-- IMPORTANT: ton fichier s'appelle index.js -->
<script src="js/index.js"></script>

</body>
</html>
